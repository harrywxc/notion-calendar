name: Update Calendar

on:
  schedule:
    - cron: '*/60 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Fetch latest calendar
        run: curl -sL "https://harrywxc.github.io/notion-calendar/calendar.ics" -o calendar.ics
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add calendar.ics
          git diff --staged --quiet || git commit -m "Update calendar $(date -u)"
          git push
