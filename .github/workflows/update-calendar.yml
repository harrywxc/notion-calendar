name: Update Calendar

on:
  schedule:
    - cron: '*/60 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install httpx icalendar pytz
      
      - name: Check Notion Token
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" -X POST "https://api.notion.com/v1/search" \
            -H "Authorization: Bearer $NOTION_TOKEN" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            -d '{"page_size": 1}')
          if [ "$response" != "200" ]; then
            echo "NOTION_TOKEN_INVALID=true" >> $GITHUB_ENV
            echo "Token失效，HTTP状态码: $response"
          fi
      
      - name: Alert if Token Invalid
        if: env.NOTION_TOKEN_INVALID == 'true'
        env:
          PUSH_PLUS_TOKEN: ${{ secrets.PUSH_PLUS_TOKEN }}
        run: |
          curl -X POST "https://www.pushplus.plus/send" \
            -H "Content-Type: application/json" \
            -d '{"token":"'"$PUSH_PLUS_TOKEN"'","title":"⚠️ Notion Token失效","content":"GitHub Actions无法访问Notion，请检查Token是否被撤销"}'
      
      - name: Generate ICS
        if: env.NOTION_TOKEN_INVALID != 'true'
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python generate_ics.py
      
      - name: Commit and Push
        if: env.NOTION_TOKEN_INVALID != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add calendar.ics
          git diff --staged --quiet || git commit -m "Update $(date -u)"
          git push
